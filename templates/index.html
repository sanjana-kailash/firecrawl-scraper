<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Summariser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --accent: #6366f1;
            --accent2: #8b5cf6;
            --text: #e2e8f0;
            --muted: #64748b;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
        }

        /* ── Animated mesh background ── */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139,92,246,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(16,185,129,0.06) 0%, transparent 60%);
            animation: meshShift 12s ease-in-out infinite alternate;
        }

        @keyframes meshShift {
            0%   { filter: hue-rotate(0deg) brightness(1); }
            100% { filter: hue-rotate(30deg) brightness(1.1); }
        }

        /* ── Floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            pointer-events: none;
            animation: float 18s ease-in-out infinite;
        }
        .orb-1 { width: 420px; height: 420px; background: var(--accent); top: -120px; left: -80px; animation-delay: 0s; }
        .orb-2 { width: 320px; height: 320px; background: var(--accent2); bottom: -80px; right: -60px; animation-delay: -6s; }
        .orb-3 { width: 220px; height: 220px; background: var(--success); top: 40%; left: 60%; animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(40px, -30px) scale(1.05); }
            66%       { transform: translate(-20px, 20px) scale(0.97); }
        }

        /* ── Layout ── */
        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 760px;
            padding: 60px 24px 80px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.35);
            border-radius: 999px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            color: #a5b4fc;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .badge .dot {
            width: 6px; height: 6px;
            background: #6366f1;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            background: linear-gradient(135deg, #e2e8f0 0%, #a5b4fc 50%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.15;
            margin-bottom: 14px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.6;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 32px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 20px 60px rgba(0,0,0,0.5);
        }

        /* ── Form ── */
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 10px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .input-wrap {
            position: relative;
            display: flex;
            gap: 10px;
        }

        .url-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px 14px 44px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input[type="text"]::placeholder { color: var(--muted); }

        input[type="text"]:focus {
            border-color: rgba(99,102,241,0.6);
            background: rgba(99,102,241,0.05);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            box-shadow: 0 4px 20px rgba(99,102,241,0.35);
            white-space: nowrap;
        }

        .btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,0.5); }
        .btn:active { transform: translateY(0px);  box-shadow: 0 2px 10px rgba(99,102,241,0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ── Loading spinner ── */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn.loading .spinner     { display: block; }
        .btn.loading .btn-text    { display: none; }
        .btn.loading .btn-icon    { display: none; }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0;
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Summary result ── */
        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .result-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(16,185,129,0.25), rgba(5,150,105,0.15));
            border: 1px solid rgba(16,185,129,0.3);
            display: flex; align-items: center; justify-content: center;
            color: var(--success);
            flex-shrink: 0;
        }

        .result-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .result-subtitle {
            font-size: 12px;
            color: var(--muted);
        }

        .summary-box {
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            line-height: 1.75;
            font-size: 15px;
            color: #cbd5e1;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ── Footer ── */
        .footer {
            margin-top: 36px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }

        .footer span { color: #6366f1; }

        /* ── Fade-in animation for result ── */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="page">

        <!-- Header -->
        <div class="header">
            <div class="badge"><span class="dot"></span> Powered by Firecrawl &amp; Groq</div>
            <h1>AI News Summariser</h1>
            <p class="subtitle">Drop any news article URL and get an instant AI-generated summary.</p>
        </div>

        <!-- Main card -->
        <div class="card">
            <form method="POST" action="/" id="scrapeForm">
                <label class="form-label" for="urlInput">Article URL</label>
                <div class="input-wrap">
                    <svg class="url-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <input
                        type="text"
                        id="urlInput"
                        name="url"
                        placeholder="https://example.com/news/article"
                        autocomplete="off"
                        required
                    >
                    <button class="btn" type="submit" id="submitBtn">
                        <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                        <span class="btn-text">Summarise</span>
                        <div class="spinner"></div>
                    </button>
                </div>
            </form>

            {% if summary %}
            <div class="divider">Summary</div>

            <div class="fade-in">
                <div class="result-header">
                    <div class="result-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <div>
                        <div class="result-title">Summary ready</div>
                        <div class="result-subtitle">Generated by Groq LLM</div>
                    </div>
                </div>
                <div class="summary-box">{{ summary }}</div>
            </div>
            {% endif %}
        </div>

        <div class="footer">
            Built with <span>Firecrawl</span> · <span>Groq</span> · <span>Flask</span>
        </div>

    </div>

    <script>
        const form = document.getElementById('scrapeForm');
        const btn  = document.getElementById('submitBtn');

        form.addEventListener('submit', () => {
            btn.classList.add('loading');
            btn.disabled = true;
        });
    </script>
</body>
</html>
